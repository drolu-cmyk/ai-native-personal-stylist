services:
  api:
    build: .
    ports:
      - "4000:4000"
    env_file:
      - .env.local
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
  web:
    image: node:20.18.1-bookworm-slim
    working_dir: /app
    command: sh -c "corepack enable && corepack prepare pnpm@9.15.4 --activate && pnpm install && pnpm --filter @stylist/web dev"
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    volumes:
      - .:/app
    depends_on:
      - api

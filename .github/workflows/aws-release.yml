name: AWS Release Preflight

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type preflight to run release readiness checks. This workflow does not deploy.
        required: true
        default: preflight

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    if: inputs.confirm == 'preflight'
    env:
      NODE_ENV: production
      APP_ENV: production
      PUBLIC_APP_NAME: Personal Stylist
      PUBLIC_WEB_URL: ${{ vars.PUBLIC_WEB_URL }}
      API_BASE_URL: ${{ vars.API_BASE_URL }}
      NEXT_PUBLIC_API_BASE_URL: ${{ vars.API_BASE_URL }}
      API_PORT: 4000
      AI_PROVIDER: ${{ vars.AI_PROVIDER || 'mock' }}
      VOICE_STT_PROVIDER: ${{ vars.VOICE_STT_PROVIDER || 'mock' }}
      VOICE_TTS_PROVIDER: ${{ vars.VOICE_TTS_PROVIDER || 'mock' }}
      VISION_PROVIDER: ${{ vars.VISION_PROVIDER || 'mock' }}
      WEATHER_PROVIDER: ${{ vars.WEATHER_PROVIDER || 'mock' }}
      MAPS_PROVIDER: ${{ vars.MAPS_PROVIDER || 'mock' }}
      CORS_ORIGINS: ${{ vars.CORS_ORIGINS }}
      RATE_LIMIT_MAX: ${{ vars.RATE_LIMIT_MAX || '100' }}
      MAX_IMAGE_UPLOAD_MB: ${{ vars.MAX_IMAGE_UPLOAD_MB || '8' }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
      ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm validate:env --mode=production
      - run: pnpm aws:preflight
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm smoke:api
      - run: pnpm audit --audit-level moderate
      - run: docker build -t personal-stylist-api:preflight .
